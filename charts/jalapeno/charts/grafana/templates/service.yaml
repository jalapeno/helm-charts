{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: {{ .Release.Namespace }}
  labels:
    app: grafana
spec:
  ports:
  - port: 3000
    name: grafana
  selector:
    app: grafana
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-np
  namespace: {{ .Release.Namespace }}
  labels:
    app: grafana
spec:
  type: {{ .Values.service.type }}
  ports:
  - name: 3000-tcp
    port: 3000
    nodePort: {{ .Values.service.nodePort }}
    targetPort: 3000
  selector:
    app: grafana
{{- end }}
