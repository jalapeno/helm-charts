{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: {{ .Release.Namespace }}
  labels:
    app: grafana
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        command:
        - grafana-server
        args:
        - '--homepath=/usr/share/grafana'
        - '--config=/etc/grafana/grafana.ini'
        ports:
        - containerPort: 3000
        volumeMounts:
        - mountPath: /etc/grafana
          name: grafana-config
        - mountPath: /var/log/grafana
          name: grafana-log
        - mountPath: /var/lib/grafana
          name: grafana-lib
      volumes:
      - name: grafana-config
        configMap:
          defaultMode: 420
          name: grafana-config
      - name: grafana-log
        emptyDir: {}
      - name: grafana-lib
        emptyDir: {}
{{- end }}
