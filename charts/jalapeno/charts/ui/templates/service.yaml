{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: jalapeno-ui
  namespace: {{ .Release.Namespace }}
  labels:
    app: jalapeno-ui
  annotations:
    service.kubernetes.io/description: "Jalapeno UI service"
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.targetPort }}
    nodePort: {{ .Values.service.nodePort }}
    protocol: TCP
    name: http
  selector:
    app: jalapeno-ui
{{- end }}
