{{- if .Values.enabled }}
{{- $arangoServer := .Values.global.arangodb.server }}
{{- $arangoDb := .Values.global.arangodb.databaseName }}
{{- $arangoPassword := .Values.global.credentials.arangoPassword }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: igp-graph
  namespace: {{ .Release.Namespace }}
  labels:
    app: igp-graph
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: igp-graph
  template:
    metadata:
      labels:
        app: igp-graph
    spec:
      initContainers:
      - name: wait-for-data
        image: {{ .Values.initContainer.image }}
        command:
        - sh
        - -c
        - |
          echo "Waiting {{ .Values.initContainer.initialDelay }} seconds for gobmp-arango to start base collection processing..."
          sleep {{ .Values.initContainer.initialDelay }}
          echo "Waiting for base link-state collections to have data..."
          until [ $(curl -s -u root:{{ $arangoPassword }} "{{ $arangoServer }}/_db/{{ $arangoDb }}/_api/collection/ls_node/count" | grep -o '"count":[0-9]*' | cut -d':' -f2) -gt 0 ] 2>/dev/null; do
            echo "ls_node collection empty, waiting...";
            sleep {{ .Values.initContainer.checkInterval }};
          done
          echo "Base link-state data available, waiting {{ .Values.initContainer.stabilizationDelay }} more seconds for processing..."
          sleep {{ .Values.initContainer.stabilizationDelay }}
          echo "Starting IGP graph processor"
      containers:
      - name: igp-graph
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.global.imagePullPolicy | default "Always" }}
        args:
        - --v
        - {{ .Values.verbosity | quote }}
        - --message-server
        - {{ .Values.global.kafka.server | quote }}
        - --database-server
        - {{ $arangoServer | quote }}
        - --database-name
        - {{ $arangoDb | quote }}
        volumeMounts:
        - name: credentials
          mountPath: /credentials
      volumes:
      - name: credentials
        secret:
          secretName: {{ .Release.Name }}-jalapeno
{{- end }}
