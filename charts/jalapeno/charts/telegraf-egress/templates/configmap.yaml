{{- if .Values.enabled }}
kind: ConfigMap
apiVersion: v1
metadata:
  name: telegraf-egress-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: telegraf-egress
data:
  telegraf.conf: |
    [agent]
      interval = {{ .Values.config.interval | quote }}
      round_interval = true
      metric_buffer_limit = 10000
      flush_buffer_when_full = true
      collection_jitter = "0s"
      flush_interval = {{ .Values.config.flushInterval | quote }}
      flush_jitter = "0s"
      debug = false
      quiet = false
      hostname = "telegraf"

    [[inputs.kafka_consumer]]
      brokers = [{{ .Values.global.kafka.server | quote }}]
      topics = ["jalapeno.telemetry"]
      max_message_len = 1000000
      data_format = "influx"

    [[outputs.influxdb]]
      urls = [{{ .Values.config.influxdbUrl | quote }}]
      database = {{ .Values.config.influxdbDatabase | quote }}
      username = {{ .Values.config.influxdbUsername | quote }}
      password = {{ .Values.config.influxdbPassword | quote }}
      precision = "s"
      timeout = "5s"
{{- end }}
