{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: gobmp
  namespace: {{ .Release.Namespace }}
  labels:
    app: gobmp
spec:
  type: {{ .Values.service.type }}
  ports:
  - name: bmp
    port: {{ .Values.service.bmpPort }}
    nodePort: {{ .Values.service.bmpNodePort }}
    targetPort: {{ .Values.service.bmpPort }}
    protocol: TCP
  - name: perf
    port: {{ .Values.service.perfPort }}
    nodePort: {{ .Values.service.perfNodePort }}
    targetPort: {{ .Values.service.perfPort }}
    protocol: TCP
  selector:
    app: gobmp
{{- end }}
