{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: arangodb
  namespace: {{ .Release.Namespace }}
  labels:
    app: arangodb
spec:
  ports:
  - port: 8529
    name: arango
  selector:
    app: arangodb
---
apiVersion: v1
kind: Service
metadata:
  name: arango-np
  namespace: {{ .Release.Namespace }}
  labels:
    app: arangodb
spec:
  type: {{ .Values.service.type }}
  ports:
  - name: 8529-tcp
    port: 8529
    nodePort: {{ .Values.service.nodePort }}
    targetPort: 8529
  selector:
    app: arangodb
{{- end }}
