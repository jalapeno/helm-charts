{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: jalapeno-api
  namespace: {{ .Release.Namespace }}
  labels:
    app: jalapeno-api
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.targetPort }}
    nodePort: {{ .Values.service.nodePort }}
  selector:
    app: jalapeno-api
{{- end }}
