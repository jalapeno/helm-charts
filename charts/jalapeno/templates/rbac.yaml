apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "jalapeno.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "jalapeno.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "jalapeno.fullname" . }}
  labels:
    {{- include "jalapeno.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["list", "watch", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "jalapeno.fullname" . }}
  labels:
    {{- include "jalapeno.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "jalapeno.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "jalapeno.fullname" . }}
    namespace: {{ .Release.Namespace }}
