name: Release Charts

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Build dependencies
        run: helm dependency build charts/jalapeno

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update chart versions
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^version:.*/version: ${VERSION}/" charts/jalapeno/Chart.yaml
          sed -i "s/^version:.*/version: ${VERSION}/" charts/jalapeno-tenant/Chart.yaml
          echo "Chart version set to ${VERSION}"

      - name: Package charts
        run: |
          helm package charts/jalapeno
          helm package charts/jalapeno-tenant

      - name: Push charts to GHCR
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          helm push jalapeno-${VERSION}.tgz oci://ghcr.io/jalapeno/helm-charts
          helm push jalapeno-tenant-${VERSION}.tgz oci://ghcr.io/jalapeno/helm-charts
          echo "Published jalapeno ${VERSION} to ghcr.io/jalapeno/helm-charts"
          echo "Published jalapeno-tenant ${VERSION} to ghcr.io/jalapeno/helm-charts"
