name: Lint and Test Charts

on:
  pull_request:
    paths:
      - "charts/**"
      - ".github/workflows/lint-test.yaml"
  push:
    branches: [main]
    paths:
      - "charts/**"

permissions:
  contents: read
  packages: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint jalapeno chart
        run: |
          helm dependency build charts/jalapeno
          helm lint charts/jalapeno

      - name: Lint jalapeno-tenant chart
        run: helm lint charts/jalapeno-tenant

      - name: Validate base install templates
        run: |
          helm template jalapeno charts/jalapeno \
            --namespace jalapeno > /dev/null

      - name: Validate topology-only templates
        run: |
          helm template jalapeno charts/jalapeno \
            -f charts/jalapeno/values-topology-only.yaml \
            --namespace jalapeno > /dev/null

      - name: Validate multi-tenant infra templates
        run: |
          helm template jalapeno charts/jalapeno \
            -f charts/jalapeno/values-multi-tenant-infra.yaml \
            --namespace jalapeno > /dev/null

      - name: Validate kind templates
        run: |
          helm template jalapeno charts/jalapeno \
            -f charts/jalapeno/values-kind.yaml \
            --namespace jalapeno > /dev/null

      - name: Validate openshift templates
        run: |
          helm template jalapeno charts/jalapeno \
            -f charts/jalapeno/values-openshift.yaml \
            --namespace jalapeno > /dev/null

      - name: Validate tenant chart templates
        run: |
          helm template swift-falcon charts/jalapeno-tenant \
            --namespace swift-falcon > /dev/null

  install-test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Create Kind cluster
        uses: helm/kind-action@v1

      - name: Configure GHCR pull access
        run: |
          kubectl create namespace jalapeno
          kubectl create secret docker-registry ghcr-auth \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            -n jalapeno

      - name: Build chart dependencies
        run: helm dependency build charts/jalapeno

      - name: Install base chart on Kind
        run: |
          helm install jalapeno charts/jalapeno \
            -f charts/jalapeno/values-kind.yaml \
            --namespace jalapeno \
            --set global.imagePullSecrets[0].name=ghcr-auth \
            --wait --timeout 8m

      - name: Verify pods are running
        run: |
          kubectl get pods -n jalapeno
          kubectl wait --for=condition=ready pod -l app=arangodb \
            -n jalapeno --timeout=120s
          kubectl wait --for=condition=ready pod -l app=kafka \
            -n jalapeno --timeout=120s
          kubectl wait --for=condition=ready pod -l app=jalapeno-api \
            -n jalapeno --timeout=120s

      - name: Debug on failure
        if: failure()
        run: |
          echo "=== Pod status ==="
          kubectl get pods -n jalapeno -o wide
          echo ""
          echo "=== Pod descriptions ==="
          kubectl describe pods -n jalapeno
          echo ""
          echo "=== Events ==="
          kubectl get events -n jalapeno --sort-by='.lastTimestamp'

      - name: Uninstall base chart
        if: always()
        run: |
          helm uninstall jalapeno -n jalapeno || true
          kubectl delete namespace jalapeno --wait || true

      - name: Install topology-only chart on Kind
        run: |
          kubectl create namespace jalapeno
          kubectl create secret docker-registry ghcr-auth \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            -n jalapeno

          helm install jalapeno charts/jalapeno \
            -f charts/jalapeno/values-kind.yaml \
            -f charts/jalapeno/values-topology-only.yaml \
            --namespace jalapeno \
            --set global.imagePullSecrets[0].name=ghcr-auth \
            --wait --timeout 8m

      - name: Verify topology-only pods
        run: |
          kubectl get pods -n jalapeno
          TELEGRAF_PODS=$(kubectl get pods -n jalapeno -l app=telegraf-ingress --no-headers 2>/dev/null | wc -l)
          if [ "$TELEGRAF_PODS" -gt 0 ]; then
            echo "ERROR: telegraf-ingress should not be running in topology-only mode"
            exit 1
          fi
          echo "Topology-only validation passed: no telemetry pods found"

      - name: Uninstall and test multi-tenant
        run: |
          helm uninstall jalapeno -n jalapeno || true
          kubectl delete namespace jalapeno --wait || true

          kubectl create namespace jalapeno
          kubectl create secret docker-registry ghcr-auth \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            -n jalapeno

          helm install jalapeno charts/jalapeno \
            -f charts/jalapeno/values-multi-tenant-infra.yaml \
            -f charts/jalapeno/values-kind.yaml \
            --namespace jalapeno \
            --set global.imagePullSecrets[0].name=ghcr-auth \
            --wait --timeout 8m

          kubectl create namespace swift-falcon
          kubectl create secret docker-registry ghcr-auth \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            -n swift-falcon

          helm install swift-falcon charts/jalapeno-tenant \
            --namespace swift-falcon \
            --set global.imagePullSecrets[0].name=ghcr-auth \
            --wait --timeout 5m

          echo "=== Shared infra namespace ==="
          kubectl get pods -n jalapeno

          echo "=== Tenant namespace ==="
          kubectl get pods -n swift-falcon

          kubectl wait --for=condition=ready pod -l app=gobmp \
            -n swift-falcon --timeout=60s

      - name: Debug multi-tenant on failure
        if: failure()
        run: |
          echo "=== jalapeno namespace ==="
          kubectl get pods -n jalapeno -o wide 2>/dev/null || true
          kubectl get events -n jalapeno --sort-by='.lastTimestamp' 2>/dev/null || true
          echo ""
          echo "=== swift-falcon namespace ==="
          kubectl get pods -n swift-falcon -o wide 2>/dev/null || true
          kubectl get events -n swift-falcon --sort-by='.lastTimestamp' 2>/dev/null || true
